# Smithery MCP Registry — wrench-plugins
# https://smithery.ai

name: wrench-plugins
version: 1.1.0
description: >
  Wrench.ai's official Claude Code plugin marketplace. Skills for B2B intelligence,
  revenue operations, engineering quality, and content production. Includes chart
  generation, feature specs, bug audits, data engineering review, UX governance,
  outreach sequences, meeting dossiers, SEO audits, and CRO analysis.
homepage: https://wrench.ai
repository: https://github.com/WrenchAI/wrench-plugins
license: MIT

author:
  name: Wrench.ai
  email: dan@wrench.ai
  url: https://wrench.ai

categories:
  - productivity
  - development
  - sales
  - marketing

keywords:
  - b2b-intelligence
  - lead-scoring
  - revenue-operations
  - outreach
  - data-visualization
  - feature-spec
  - bug-audit
  - seo
  - cro
  - meeting-prep

installation:
  type: claude-code-marketplace
  command: "/plugin marketplace add github:WrenchAI/wrench-plugins"

skills:
  - name: wrench-charts
    description: Brand-compliant Recharts chart generation — type selection, tokens, tooltip patterns
  - name: feature-spec
    description: Complete feature specs with ACs, task breakdown, and Cypress test plan
  - name: bug-audit
    description: Structured release audit — functional, UX, test coverage, customer-surfaced
  - name: wrench-de-review
    description: Data engineering PR review — idempotency, dedup, schema contracts
  - name: wrench-ux-constitution
    description: UX governance — 11 principles, Six Pillars, pre-ship checklist
  - name: wrench-outreach
    description: B2B outreach sequences — email and LinkedIn, multi-step, persona-specific
  - name: meeting-dossier
    description: Pre-meeting intelligence brief from Wrench.ai enrichment data
  - name: dossier-builder
    description: Contact intelligence dossier — Wrench.ai signals as a scannable HTML artifact
  - name: humanizer
    description: Remove AI writing patterns — strips corporate filler and hedging
  - name: seo-audit
    description: Comprehensive SEO audit — technical, on-page, Core Web Vitals
  - name: page-cro
    description: Conversion rate optimization for marketing pages
  - name: wrench-personalize
    description: Persona-based B2B personalization — archetype, meta-measures, positioning, message variants
  - name: wrench-dossier
    description: Contact intelligence brief with voice-adaptive ghostwriter output
  - name: wrench-report
    description: Sales intelligence reports — Competitive 360, Brand Insights, or Lead Scoring CRM Report
